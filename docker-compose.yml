version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tilburg_db
    restart: always
    environment:
      POSTGRES_USER: politiek_user
      POSTGRES_PASSWORD: politiek_secure_password_2026
      POSTGRES_DB: tilburg_decisions
    volumes:
      # Named volume safely retains records even if you rebuild images
      - pg-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://politiek_user:politiek_secure_password_2026@postgres:5432/tilburg_decisions
    depends_on:
      - postgres

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://politiek_user:politiek_secure_password_2026@postgres:5432/tilburg_decisions
    depends_on:
      - postgres
    command: npm run worker
    restart: always

volumes:
  pg-data: